## foundationdb.conf
##
## Benchmark configuration for a single EC2 instance (m5d.4xlarge - 16 vCPU, 64GB RAM, 2x 300GB NVMe SSD)
##
## Disk layout:
##   /mnt/nvme0 (NVMe #1, ext4) — commit path: tlog, proxies, resolver
##   /mnt/nvme1 (NVMe #2, ext4) — data path: storage processes
##
## After starting: fdbcli -C /etc/foundationdb/fdb.cluster --exec "configure new single ssd-redwood-1"

[fdbmonitor]
user = foundationdb
group = foundationdb

[general]
restart-delay = 10
cluster-file = /etc/foundationdb/fdb.cluster

[fdbserver]
command = /usr/sbin/fdbserver
public-address = auto:$ID
listen-address = public
logdir = /var/log/foundationdb
memory = 8GiB

## Storage servers (NVMe #2 — data path)
[fdbserver.4500]
class = storage
datadir = /mnt/nvme1/fdb/4500
storage-memory = 6GiB

[fdbserver.4501]
class = storage
datadir = /mnt/nvme1/fdb/4501
storage-memory = 6GiB

[fdbserver.4502]
class = storage
datadir = /mnt/nvme1/fdb/4502
storage-memory = 6GiB

## Transaction log (NVMe #1 — commit path)
[fdbserver.4510]
class = transaction
datadir = /mnt/nvme0/fdb/4510

## Commit proxies (NVMe #1 — commit path)
[fdbserver.4520]
class = commit_proxy
datadir = /mnt/nvme0/fdb/4520

[fdbserver.4521]
class = commit_proxy
datadir = /mnt/nvme0/fdb/4521

## GRV proxies (NVMe #1 — commit path)
[fdbserver.4522]
class = grv_proxy
datadir = /mnt/nvme0/fdb/4522

[fdbserver.4523]
class = grv_proxy
datadir = /mnt/nvme0/fdb/4523

## Resolver (NVMe #1 — commit path)
[fdbserver.4530]
class = resolution
datadir = /mnt/nvme0/fdb/4530
