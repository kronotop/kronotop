{
  default_namespace = "global"
  data_dir = ""

  cluster = {
    heartbeat {
      interval = 5
      maximum_silent_period = 20
    }
    client_pool {
      idle_timeout = 10 // minutes
    }
  }

  session_attributes {
    input_type = "bson"
    reply_type = "bson"
  }

  network {
    external {
      host = "localhost"
      port = 0
      netty {
        transport = "nio"
      }
    }

    internal {
      host = "localhost"
      port = 0
      netty {
        transport = "nio"
      }
    }
  }

  auth = {
    requirepass = "devpass"
  }

  foundationdb = {
    clusterfile = ""
    fdbc = "/usr/local/lib/libfdb_c.dylib"
    #fdbjava = <path to libfdb_java.jnilib>
    apiversion = 630
  }

  // common configuration variables for volume instances
  volume {
    // Controls the background vacuum process that reclaims space from stale segments.
    vacuum {
      // Maximum number of concurrent vacuum worker threads.
      // Set to 0 to use the number of available CPU cores.
      max_workers = 1
    }

    replication {
      max_retries = 3
      retry_interval = 1 // seconds
      reset_threshold = 1 // seconds
      reconnect_backoff = 250 // milliseconds
    }
  }

  bucket {
    shards = 7

    # Controls how ObjectIds are encoded in DELETE and UPDATE responses.
    # "bytes" returns raw 12-byte ObjectId, "hex" returns 24-char hex string.
    object_id_format = "hex"

    plan_cache {
      enabled: true
      max_ttl: 300000 // milliseconds
    }

    volume {
      segment_size = 1048576
      segment_replication_chunk_size = 16777216 // 1 << 24
    }

    # The `index` block defines configuration options for secondary indexes.
    index {
      # strict_types enables strict type enforcement for secondary indexes.
      #
      # When enabled, index operations require an exact type match between
      # indexed values and query predicates. The system does not perform
      # implicit type coercion or value normalization.
      #
      # - Queries with mismatched predicate types do not use the index.
      # - Index build and maintenance skip values with incompatible types.
      # - Prevents mixed-type values under the same indexed field.
      # - Ensures deterministic behavior for statically typed clients.
      strict_types = true

      # The `maintenance` object defines configuration parameters for the background
      # index maintenance subsystem. This subsystem is responsible for managing and executing
      # index build and cleanup tasks in the background.
      maintenance {
        # Number of worker threads in the pool.
        # If set to 0, the system will automatically use the number of available CPU cores.
        worker_pool_size = 0

        # Interval at which the maintenance scheduler runs periodic checks
        # such as cleaning up stale workers and dispatching pending tasks.
        # Default: 60 seconds
        worker_maintenance_interval = 60
      }
    }

    vector {
      # RAM threshold (bytes) for flushing an on-heap vector index to disk.
      # When an index exceeds this limit after an insert, it is rotated and
      # flushed asynchronously. Default: 256 MB.
      flush_threshold_bytes = 268435456

      # Minimum number of vectors before Product Quantization training kicks in.
      # Until this threshold is reached, exact scoring is used for graph construction.
      pq_training_threshold = 1000

      # Controls the number of PQ subspaces: subspaces = dimensions / pq_subspace_divisor.
      pq_subspace_divisor = 6

      # Safety cap for filtered vector search. Limits the total number of unique
      # candidates examined during post-filter graph traversal. Once reached, the
      # search stops expanding even if fewer than TOP results matched the filter.
      max_scan_candidates = 10000

      # Overquery multiplier for vector search. Controls how many extra candidates
      # the graph traversal collects before reranking to the final top-K.
      # Higher values improve recall for PQ-scored indexes at the cost of latency.
      default_overquery = 1.0
    }
  }

  stash {
    enabled: true
    shards = 7
    volume {
      segment_size = 1048576
      segment_replication_chunk_size = 16777216 // 1 << 24
    }
    volume_syncer {
      prefix = "stash-volume-syncer"
      workers = 8
      period = 100
    }
  }

  background_tasks {
    journal_cleanup_task {
      retention_period: 1
      timeunit: days
    }
  }

  // Configuration for some integration tests
  __test__ {
    bucket_metadata_convergence {
      skip_wait_transaction_limit: true
    }
  }
}